<link href="https://fonts.googleapis.com/css?family=Roboto:300,400,700,400italic&amp;display=swap" rel="stylesheet" type="text/css">
<style>
.sbdocs.sbdocs-content {max-width: unset;}

.sbdocs.sbdocs-content :where(p:not(.sb-anchor, .sb-unstyled, .sb-unstyled p)),
.sbdocs.sbdocs-content :where(li:not(.sb-anchor, .sb-unstyled, .sb-unstyled li)) {
  font-size: 1rem !important;
  line-height: 1.5 !important;
}

.sbdocs.sbdocs-content :where(p:not(.sb-anchor, .sb-unstyled, .sb-unstyled p)) code,
.sbdocs.sbdocs-content :where(li:not(.sb-anchor, .sb-unstyled, .sb-unstyled li)) code {
  font-size: 1rem !important;
}

.docblock-argstable {
    font-size: 1rem !important;
    line-height: 1.5 !important;
}

.docblock-argstable input,
.docblock-argstable textarea,
.docblock-argstable select,
.docblock-argstable td > div > div > span {
    font-size: 0.875em !important;
}

.docblock-argstable td > div > div > span {
    line-height: unset;
}
</style>


<style>
    /* prismjs theme */


html[lang] code[class*="language-"],
html[lang] pre[class*="language-"] {
    color: black;
    background: none;
    text-shadow: 0 1px white;
    font-family: monospace;
    text-align: left;
    white-space: pre;
    word-spacing: normal;
    word-break: normal;
    word-wrap: normal;

    -moz-tab-size: 4;
    -o-tab-size: 4;
    tab-size: 4;

    -webkit-hyphens: none;
    -moz-hyphens: none;
    -ms-hyphens: none;
    hyphens: none;
}

@media print {
    code[class*="language-"],
    pre[class*="language-"] {
        text-shadow: none;
    }
}

/* Code blocks */
html[lang] pre:has(code[class*="language-"]) {
    padding: 15px;
    margin: 16px 0;
    overflow: auto;
    border: 1px solid #b3b3b3;
}

html[lang] .pre--no-border[class*="language-"] {
    border: 0;
}

html[lang] pre[class*="language-"] > code[class*="language-"] {
    padding: 0;
}

html[lang] code[class*="language-"] {
    white-space: pre-wrap;
    overflow-wrap: break-word;
}

html[lang] :not(pre) > code[class*="language-"],
html[lang] pre:has([class*="language-"]) {
    background: #f8f8f8;
}

/* Inline code */
html[lang] :not(pre) > code[class*="language-"] {
    padding: .1em;
    border-radius: .3em;
    white-space: normal;
}

html[lang] .token.comment,
html[lang] .token.prolog,
html[lang] .token.doctype,
html[lang] .token.cdata {
    color: #5e5e5e;
}

html[lang] .token.punctuation {
    color: #5e5e5e;
}

html[lang] .token.namespace {
    opacity: .7;
}

html[lang] .token.property,
html[lang] .token.tag,
html[lang] .token.boolean,
html[lang] .token.number,
html[lang] .token.constant,
html[lang] .token.symbol,
html[lang] .token.deleted {
    color: #741e6d;
}

html[lang] .token.selector,
html[lang] .token.attr-name,
html[lang] .token.string,
html[lang] .token.char,
html[lang] .token.builtin,
html[lang] .token.inserted {
    color: #196a2f;
}

html[lang] .token.operator,
html[lang] .token.entity,
html[lang] .token.url,
.language-css html[lang] .token.string,
.style html[lang] .token.string {
    color: #946a38
}

html[lang] .token.atrule,
html[lang] .token.attr-value,
html[lang] .token.keyword {
    color: #0065bd
}

html[lang] .token.function,
html[lang] .token.class-name {
    color: #d32205;
}

html[lang] .token.regex,
html[lang] .token.important,
html[lang] .token.variable {
    color: #946a38
}

html[lang] .token.important,
html[lang] .token.bold {
    font-weight: bold;
}
html[lang] .token.italic {
    font-style: italic;
}

html[lang] .token.entity {
    cursor: help;
}

:has(>.prismjs) {
    background: #f8f8f8;
    color: black;

    font-size: .875rem;
    line-height: 1.7142857143;
}

@media(min-width: 768px) {
    :has(>.prismjs) {
        font-size: 1rem;
        line-height: 1.5
    }
}
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (window.DS?.tracking) {
            window.DS.tracking.init();
        }
    });
    document.documentElement.classList.add('js-enabled');
</script>
